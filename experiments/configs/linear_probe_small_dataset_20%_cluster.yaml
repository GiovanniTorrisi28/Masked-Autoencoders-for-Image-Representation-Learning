experiment:
  name: "linear_probe_small_dataset_20%"
  seed: 42

data:
  root: "data/raw/imagenet100"
  image_size: 224
  batch_size: 128
  num_workers: 8
  pin_memory: true
  fraction: 0.2
  fraction_seed: 42

model:
  patch_size: 16
  img_size: 224
  num_classes: 100
  head_dropout: 0.0
  encoder:
    embed_dim: 768
    depth: 12
    num_heads: 12
    mlp_ratio: 4.0
    dropout: 0.0
  pretrained_encoder: "experiments/checkpoints/mae_pretrain/checkpoint_best.pth"
  freeze_encoder: true

training:
  epochs: 100
  optimizer:
    name: "adamw"
    lr: 1.0e-2
    weight_decay: 0.0
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_epochs: 5
    min_lr: 1.0e-4
  grad_clip: null

logging:
  log_dir: "experiments/logs"
  log_freq: 50
  use_wandb: true
  use_tensorboard: true
  wandb_project: "mae-imagenet100"

checkpointing:
  checkpoint_dir: "experiments/checkpoints/linear_probe_small_dataset_20%"
  resume: null
