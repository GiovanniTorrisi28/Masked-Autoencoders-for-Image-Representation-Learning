experiment:
  name: "smoke_supervised_vit"
  seed: 42

data:
  root: "data/raw/imagenet100"  # same relative path as local
  image_size: 224
  batch_size: 64           # safe for gpu-xlarge (22 GB VRAM) with ViT-Base (~19 GB at bs=128)
  num_workers: 4
  pin_memory: true

model:
  patch_size: 16
  img_size: 224
  num_classes: 100
  label_smoothing: 0.1
  head_dropout: 0.0
  encoder:
    embed_dim: 768
    depth: 12
    num_heads: 12
    mlp_ratio: 4.0
    dropout: 0.1

training:
  epochs: 2                # smoke test: just verify pipeline runs
  warmup_epochs: 1
  optimizer:
    name: "adamw"
    lr: 5.0e-4             # scaled: 1e-3 * (128/256)
    weight_decay: 0.05
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_epochs: 1
    min_lr: 1.0e-6
  grad_clip: 1.0

logging:
  log_dir: "experiments/logs"
  log_freq: 10
  use_wandb: true
  use_tensorboard: true
  wandb_project: "mae-imagenet100"

checkpointing:
  checkpoint_dir: "experiments/checkpoints/smoke_supervised"
  save_every: 1
  resume: null
