experiment:
  name: "supervised_vit_baseline_200"
  seed: 42

data:
  root: "data/raw/imagenet100"  # same relative path as local
  image_size: 224
  batch_size: 128          # empirically ~19 GB VRAM with ViT-Base, fits in gpu-xlarge (22 GB)
  num_workers: 8
  pin_memory: true

model:
  patch_size: 16
  img_size: 224
  num_classes: 100
  label_smoothing: 0.1
  head_dropout: 0.0
  encoder:
    embed_dim: 768
    depth: 12
    num_heads: 12
    mlp_ratio: 4.0
    dropout: 0.1

training:
  epochs: 200
  warmup_epochs: 10
  optimizer:
    name: "adamw"
    lr: 1.0e-3
    weight_decay: 0.05
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_epochs: 20
    min_lr: 1.0e-6
  grad_clip: 1.0

logging:
  log_dir: "experiments/logs"
  log_freq: 50
  use_wandb: true
  use_tensorboard: true
  wandb_project: "mae-imagenet100"

checkpointing:
  checkpoint_dir: "experiments/checkpoints/supervised_vit_baseline_200"
  resume: "experiments/checkpoints/supervised_vit_baseline_200/checkpoint_latest.pth"
